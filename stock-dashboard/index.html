<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>52주 신고가 주식분석 대시보드</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">52 Week Highs</p>
        <h1>52주 신고가 주식분석 대시보드</h1>
      </div>
      <a class="home-link" href="/">Home</a>
    </header>

    <main>
      <section class="notice" aria-label="투자 유의사항">
        <strong>투자 유의사항</strong>
        <span id="disclaimer">투자 추천이 아니라 후보 발굴용이며, 최종 판단 전 원문 확인이 필요합니다.</span>
      </section>

      <section class="kpi-grid" id="kpiGrid" aria-label="요약 지표"></section>

      <section class="controls" aria-label="필터">
        <label>
          검색
          <input id="searchInput" type="search" placeholder="티커 또는 종목명">
        </label>
        <label>
          국가
          <select id="countryFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label>
          테마
          <select id="themeFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label>
          최소 점수
          <input id="scoreFilter" type="number" min="0" max="100" step="5" value="0">
        </label>
      </section>

      <nav class="tabs" aria-label="대시보드 보기">
        <button class="tab-button active" data-view="우선순위_TOP" type="button">우선순위</button>
        <button class="tab-button" data-view="장기투자_후보" type="button">장기투자</button>
        <button class="tab-button" data-view="선행매매_후보" type="button">선행매매</button>
        <button class="tab-button" data-view="유명기관_13F증감" type="button">13F</button>
        <button class="tab-button" data-view="테마_요약" type="button">테마</button>
        <button class="tab-button" data-view="market" type="button">신고가/거래량</button>
      </nav>

      <section class="panel" aria-live="polite">
        <div class="panel-heading">
          <div>
            <h2 id="tableTitle">우선순위 TOP</h2>
            <p id="tableSubtitle">투자우선점수 기준 상위 공개 후보</p>
          </div>
          <div class="table-count" id="tableCount"></div>
        </div>
        <div class="table-wrap">
          <table id="dataTable"></table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
